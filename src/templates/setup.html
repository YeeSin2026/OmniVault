<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初始化设置 · OmniVault</title>
    <script>
        (function() {
            var theme = localStorage.getItem('omnivault-theme') || 'system';
            if (theme === 'dark') document.documentElement.classList.add('dark');
            else if (theme === 'light') ;
            else if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.classList.add('dark');
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .shadow-2d { box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 1px 2px rgba(0,0,0,.06); }
    </style>
</head>
<body class="min-h-screen bg-zinc-50 dark:bg-zinc-950 flex items-center justify-center p-6">
    <div class="w-full max-w-lg">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-zinc-900 dark:text-zinc-100">🗄️ OmniVault</h1>
            <p class="text-sm text-zinc-500 dark:text-zinc-400 mt-2">初始化设置 · Initial Setup</p>
        </div>

        <form id="setup-form" class="bg-white dark:bg-zinc-900 rounded-2xl shadow-2d p-8 border border-zinc-200 dark:border-zinc-800 space-y-6">
            <p class="text-xs text-zinc-500 dark:text-zinc-400 mb-4">配置写入 /data/.env，保存后重启容器生效。所有配置写好再点保存。</p>

            <!-- LLM API -->
            <fieldset class="border border-zinc-200 dark:border-zinc-700 rounded-xl p-4">
                <legend class="text-sm font-semibold text-zinc-800 dark:text-zinc-200 px-2">🤖 LLM API（必填）</legend>
                <div class="space-y-3 mt-3">
                    <div>
                        <label class="block text-xs text-zinc-500 mb-1">API Key</label>
                        <input name="LLM_API_KEY" value="{{ config.get('LLM_API_KEY', '') }}" placeholder="sk-..."
                            class="w-full px-3 py-2 text-sm bg-zinc-50 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-zinc-900 dark:text-zinc-100">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs text-zinc-500 mb-1">Base URL</label>
                            <input name="LLM_BASE_URL" value="{{ config.get('LLM_BASE_URL', 'https://api.deepseek.com') }}"
                                class="w-full px-3 py-2 text-sm bg-zinc-50 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-zinc-900 dark:text-zinc-100">
                        </div>
                        <div>
                            <label class="block text-xs text-zinc-500 mb-1">Model</label>
                            <input name="LLM_MODEL" value="{{ config.get('LLM_MODEL', 'deepseek-chat') }}"
                                class="w-full px-3 py-2 text-sm bg-zinc-50 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-zinc-900 dark:text-zinc-100">
                        </div>
                    </div>
                </div>
            </fieldset>

            <!-- Embedding API -->
            <fieldset class="border border-zinc-200 dark:border-zinc-700 rounded-xl p-4">
                <legend class="text-sm font-semibold text-zinc-800 dark:text-zinc-200 px-2">🔍 Embedding API（可选）</legend>
                <p class="text-xs text-zinc-400 mb-3">不填则使用本地 BGE-small-zh 模型</p>
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs text-zinc-500 mb-1">API URL</label>
                        <input name="EMBEDDING_API_URL" value="{{ config.get('EMBEDDING_API_URL', '') }}" placeholder="https://api.siliconflow.cn/v1/embeddings"
                            class="w-full px-3 py-2 text-sm bg-zinc-50 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-zinc-900 dark:text-zinc-100">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs text-zinc-500 mb-1">API Key（默认复用 LLM）</label>
                            <input name="EMBEDDING_API_KEY" value="{{ config.get('EMBEDDING_API_KEY', '') }}" placeholder="默认复用 LLM Key"
                                class="w-full px-3 py-2 text-sm bg-zinc-50 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-zinc-900 dark:text-zinc-100">
                        </div>
                        <div>
                            <label class="block text-xs text-zinc-500 mb-1">Model</label>
                            <input name="EMBEDDING_MODEL" value="{{ config.get('EMBEDDING_MODEL', 'bge-m3') }}"
                                class="w-full px-3 py-2 text-sm bg-zinc-50 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-zinc-900 dark:text-zinc-100">
                        </div>
                    </div>
                </div>
            </fieldset>

            <!-- 飞书 Bot -->
            <fieldset class="border border-zinc-200 dark:border-zinc-700 rounded-xl p-4">
                <legend class="text-sm font-semibold text-zinc-800 dark:text-zinc-200 px-2">📱 飞书 Bot（可选）</legend>
                <div class="space-y-3 mt-3">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs text-zinc-500 mb-1">App ID</label>
                            <input name="FEISHU_APP_ID" value="{{ config.get('FEISHU_APP_ID', '') }}" placeholder="cli_..."
                                class="w-full px-3 py-2 text-sm bg-zinc-50 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-zinc-900 dark:text-zinc-100">
                        </div>
                        <div>
                            <label class="block text-xs text-zinc-500 mb-1">App Secret</label>
                            <input name="FEISHU_APP_SECRET" value="{{ config.get('FEISHU_APP_SECRET', '') }}" placeholder="..."
                                class="w-full px-3 py-2 text-sm bg-zinc-50 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-zinc-900 dark:text-zinc-100">
                        </div>
                    </div>
                </div>
            </fieldset>

            <!-- 激活码 -->
            <fieldset class="border border-zinc-200 dark:border-zinc-700 rounded-xl p-4">
                <legend class="text-sm font-semibold text-zinc-800 dark:text-zinc-200 px-2">🔑 激活码</legend>
                <div>
                    <input name="ACTIVATION_KEY" value="" placeholder="OMV-XXXX-XXXX-XXXX"
                        class="w-full px-3 py-2 text-sm bg-zinc-50 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-zinc-900 dark:text-zinc-100 font-mono tracking-widest text-center">
                    <p class="text-xs text-zinc-400 mt-1">
                        {% if activated %}✅ 已激活{% else %}获取激活码: <a href="https://t.me/beta99898" class="text-blue-500">Telegram</a> · <a href="https://github.com/YeeSin2026" class="text-blue-500">GitHub</a>{% endif %}
                    </p>
                </div>
            </fieldset>

            <p id="msg" class="text-sm text-center hidden"></p>

            <button type="submit"
                class="w-full py-3 bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 rounded-xl font-medium hover:opacity-90 transition-opacity">
                💾 保存配置 · Save
            </button>

            <p class="text-xs text-zinc-400 text-center">保存后需重启容器: <code class="bg-zinc-100 dark:bg-zinc-800 px-2 py-0.5 rounded">docker restart omnivault</code></p>
        </form>
    </div>

    <script>
        document.getElementById('setup-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            var msg = document.getElementById('msg');
            msg.textContent = '保存中...';
            msg.className = 'text-sm text-center text-zinc-500';

            var data = {};
            new FormData(this).forEach(function(v, k) { if (v.trim()) data[k] = v.trim(); });

            try {
                var resp = await fetch('/api/setup/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                var result = await resp.json();
                if (result.ok) {
                    msg.textContent = '✅ 配置已保存！请重启容器: docker restart omnivault';
                    msg.className = 'text-sm text-center text-green-600';
                } else {
                    msg.textContent = '❌ ' + (result.error || '保存失败');
                    msg.className = 'text-sm text-center text-red-500';
                }
            } catch(err) {
                msg.textContent = '❌ 网络错误';
                msg.className = 'text-sm text-center text-red-500';
            }
        });
    </script>
</body>
</html>

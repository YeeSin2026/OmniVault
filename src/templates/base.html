<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OmniVault{% endblock %}</title>
    <script>
        (function() {
            var theme = localStorage.getItem('omnivault-theme') || 'system';
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            } else if (theme === 'light') {
                document.documentElement.classList.remove('dark');
            } else {
                if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    document.documentElement.classList.add('dark');
                }
            }
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'],
                    },
                    boxShadow: {
                        '2d': '0 1px 2px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.08)',
                        '2d-hover': '0 2px 4px rgba(0,0,0,0.08), 0 8px 24px rgba(0,0,0,0.12)',
                    },
                }
            }
        };
    </script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        html { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: #f5f5f7; }
        .dark body { background: #09090b; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 2px; }
        .dark ::-webkit-scrollbar-thumb { background: #3f3f46; }

        .entry-content h1 { font-size: 1.15rem; font-weight: 700; margin: 0.75rem 0 0.5rem; color: #18181b; }
        .entry-content h2 { font-size: 1.05rem; font-weight: 600; margin: 0.5rem 0 0.5rem; padding-bottom: 0.25rem; border-bottom: 1px solid #e4e4e7; color: #27272a; }
        .entry-content h3 { font-size: 0.95rem; font-weight: 600; margin: 0.5rem 0 0.25rem; color: #3f3f46; }
        .entry-content p { margin: 0.5rem 0; }
        .entry-content blockquote { border-left: 3px solid #d4d4d8; padding-left: 0.75rem; margin: 0.5rem 0; color: #71717a; }
        .entry-content ul, .entry-content ol { margin: 0.5rem 0; padding-left: 1.5rem; }
        .entry-content li { margin: 0.25rem 0; }
        .entry-content strong { font-weight: 600; }
        .entry-content code { font-size: 0.85em; background: #f4f4f5; padding: 1px 4px; border-radius: 3px; }
        .entry-content pre { background: #18181b; color: #e4e4e7; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.75rem 0; }
        .entry-content pre code { background: none; padding: 0; }
        .entry-content hr { border: none; border-top: 1px solid #e4e4e7; margin: 1.5rem 0; }
        .entry-content table { width: 100%; border-collapse: collapse; margin: 0.75rem 0; }
        .entry-content th, .entry-content td { border: 1px solid #d4d4d8; padding: 0.5rem 0.75rem; text-align: left; }
        .entry-content th { background: #f4f4f5; font-weight: 600; }

        .dark .entry-content h1 { color: #e4e4e7; }
        .dark .entry-content h2 { border-bottom-color: #27272a; color: #d4d4d8; }
        .dark .entry-content h3 { color: #a1a1aa; }
        .dark .entry-content blockquote { border-left-color: #52525b; color: #a1a1aa; }
        .dark .entry-content code { background: #27272a; }
        .dark .entry-content pre { background: #09090b; }
        .dark .entry-content hr { border-top-color: #27272a; }
        .dark .entry-content th, .dark .entry-content td { border-color: #52525b; }
        .dark .entry-content th { background: #27272a; }
    </style>
</head>
<body class="min-h-screen">
    <nav class="bg-white/90 dark:bg-zinc-900/90 backdrop-blur-md border-b border-zinc-200 dark:border-zinc-800 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">
            <div class="flex items-center gap-1">
                <a href="/" class="text-[15px] font-bold text-zinc-900 dark:text-zinc-200 mr-6 hover:opacity-80 transition-opacity">OmniVault</a>
                <a href="/dashboard"
                   class="text-[13px] px-3 py-2 rounded-lg transition-colors
                          {% if '/dashboard' in request.url.path or request.url.path == '/' %}
                          bg-zinc-100 dark:bg-zinc-800 text-zinc-900 dark:text-zinc-200 font-medium
                          {% else %}
                          text-zinc-600 dark:text-zinc-400 hover:bg-zinc-50 dark:hover:bg-zinc-800 hover:text-zinc-800 dark:hover:text-zinc-300
                          {% endif %}">仪表盘</a>
                <a href="/search"
                   class="text-[13px] px-3 py-2 rounded-lg transition-colors
                          {% if '/search' in request.url.path %}
                          bg-zinc-100 dark:bg-zinc-800 text-zinc-900 dark:text-zinc-200 font-medium
                          {% else %}
                          text-zinc-600 dark:text-zinc-400 hover:bg-zinc-50 dark:hover:bg-zinc-800 hover:text-zinc-800 dark:hover:text-zinc-300
                          {% endif %}">搜索</a>
                <a href="/submit"
                   class="text-[13px] px-3 py-2 rounded-lg transition-colors
                          {% if '/submit' in request.url.path %}
                          bg-zinc-100 dark:bg-zinc-800 text-zinc-900 dark:text-zinc-200 font-medium
                          {% else %}
                          text-zinc-600 dark:text-zinc-400 hover:bg-zinc-50 dark:hover:bg-zinc-800 hover:text-zinc-800 dark:hover:text-zinc-300
                          {% endif %}">开始使用</a>
                <a href="/wiki"
                   class="text-[13px] px-3 py-2 rounded-lg transition-colors
                          {% if '/wiki' in request.url.path %}
                          bg-zinc-100 dark:bg-zinc-800 text-zinc-900 dark:text-zinc-200 font-medium
                          {% else %}
                          text-zinc-600 dark:text-zinc-400 hover:bg-zinc-50 dark:hover:bg-zinc-800 hover:text-zinc-800 dark:hover:text-zinc-300
                          {% endif %}">Wiki</a>
                <a href="/logs"
                   class="text-[13px] px-3 py-2 rounded-lg transition-colors
                          {% if '/logs' in request.url.path %}
                          bg-zinc-100 dark:bg-zinc-800 text-zinc-900 dark:text-zinc-200 font-medium
                          {% else %}
                          text-zinc-600 dark:text-zinc-400 hover:bg-zinc-50 dark:hover:bg-zinc-800 hover:text-zinc-800 dark:hover:text-zinc-300
                          {% endif %}">日志</a>
                <a href="/settings"
                   class="text-[13px] px-3 py-2 rounded-lg transition-colors
                          {% if '/settings' in request.url.path %}
                          bg-zinc-100 dark:bg-zinc-800 text-zinc-900 dark:text-zinc-200 font-medium
                          {% else %}
                          text-zinc-600 dark:text-zinc-400 hover:bg-zinc-50 dark:hover:bg-zinc-800 hover:text-zinc-800 dark:hover:text-zinc-300
                          {% endif %}">设置</a>
            </div>
            <button id="theme-toggle" onclick="cycleTheme()"
                    class="text-[13px] text-zinc-500 dark:text-zinc-400 hover:text-zinc-700 dark:hover:text-zinc-200 p-2 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors"
                    title="切换主题">
                <span id="theme-icon">🌓</span>
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-6">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center text-zinc-300 dark:text-zinc-600 text-[10px] py-4">
        OmniVault v{{ VERSION }} · Powered by Whisper + LLM
    </footer>

    <script>
        var THEME_ORDER = ['system', 'light', 'dark'];
        var THEME_ICONS = { system: '🌓', light: '☀️', dark: '🌙' };
        var THEME_LABELS = { system: '跟随系统', light: '浅色模式', dark: '深色模式' };

        function getTheme() {
            return localStorage.getItem('omnivault-theme') || 'system';
        }

        function setTheme(theme) {
            localStorage.setItem('omnivault-theme', theme);
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            } else if (theme === 'light') {
                document.documentElement.classList.remove('dark');
            } else {
                if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }
            document.getElementById('theme-icon').textContent = THEME_ICONS[theme];
            document.getElementById('theme-toggle').title = THEME_LABELS[theme];
        }

        function cycleTheme() {
            var current = getTheme();
            var idx = THEME_ORDER.indexOf(current);
            var next = THEME_ORDER[(idx + 1) % 3];
            setTheme(next);
        }

        document.getElementById('theme-icon').textContent = THEME_ICONS[getTheme()];
        document.getElementById('theme-toggle').title = THEME_LABELS[getTheme()];

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
            if (getTheme() === 'system') {
                if (e.matches) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }
        });

        // 时区自适应：将所有时间转为用户本地时间（服务器均为 UTC）
        function localizeTimestamps(scope) {
            scope = scope || document;
            scope.querySelectorAll('time[datetime]').forEach(function(el) {
                var dt = el.getAttribute('datetime');
                // 无时区后缀的视为 UTC
                if (!/[Zz]$/.test(dt) && !/[+-]\d{2}:\d{2}$/.test(dt)) {
                    dt += 'Z';
                }
                var d = new Date(dt);
                if (isNaN(d)) return;
                el.textContent = d.toLocaleString();
            });
        }
        document.addEventListener('DOMContentLoaded', function() { localizeTimestamps(); });
        document.addEventListener('htmx:afterSwap', function(e) { localizeTimestamps(e.detail.target); });
    </script>
</body>
</html>

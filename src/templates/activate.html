<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>激活 · OmniVault</title>
    <script>
        (function() {
            var theme = localStorage.getItem('omnivault-theme') || 'system';
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            } else if (theme === 'light') {
                document.documentElement.classList.remove('dark');
            } else {
                if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    document.documentElement.classList.add('dark');
                }
            }
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-zinc-50 dark:bg-zinc-950 flex items-center justify-center p-6">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-zinc-900 dark:text-zinc-100">🗄️ OmniVault</h1>
            <p class="text-sm text-zinc-500 dark:text-zinc-400 mt-2">v{{ VERSION }}</p>
        </div>

        <div class="bg-white dark:bg-zinc-900 rounded-2xl shadow-2d p-8 border border-zinc-200 dark:border-zinc-800">
            <!-- 未激活状态 -->
            <div id="activate-form">
                <h2 class="text-lg font-semibold text-zinc-800 dark:text-zinc-200 mb-2">🔑 输入激活码</h2>
                <p class="text-sm text-zinc-500 dark:text-zinc-400 mb-6">Activation required to continue</p>

                <input id="key-input"
                       type="text"
                       placeholder="OMV-XXXX-XXXX-XXXX"
                       maxlength="19"
                       autocomplete="off"
                       class="w-full px-4 py-3 rounded-xl border border-zinc-300 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800 text-zinc-900 dark:text-zinc-100 text-center tracking-widest text-lg font-mono focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">

                <p id="error-msg" class="text-red-500 text-sm mt-3 text-center hidden"></p>

                <button onclick="activate()"
                        class="w-full mt-4 px-4 py-3 bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 rounded-xl font-medium hover:opacity-90 transition-opacity">
                    激活 · Activate
                </button>

                <div class="mt-6 pt-6 border-t border-zinc-200 dark:border-zinc-800">
                    <p class="text-xs text-zinc-400 dark:text-zinc-500 text-center mb-3">获取激活码 · Get a key</p>
                    <div class="flex justify-center gap-3">
                        <a href="https://x.com/YeeSin2026" target="_blank"
                           class="text-xs px-3 py-2 rounded-lg bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-200 transition-colors">
                            𝕏 Twitter
                        </a>
                        <a href="https://github.com/YeeSin2026" target="_blank"
                           class="text-xs px-3 py-2 rounded-lg bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-200 transition-colors">
                            GitHub
                        </a>
                    </div>
                </div>
            </div>

            <!-- 激活成功 -->
            <div id="activate-success" class="hidden text-center">
                <div class="text-4xl mb-4">✅</div>
                <h2 class="text-lg font-semibold text-zinc-800 dark:text-zinc-200 mb-2">激活成功！</h2>
                <p class="text-sm text-zinc-500 dark:text-zinc-400 mb-6">Activation successful</p>
                <a href="/dashboard"
                   class="inline-block px-6 py-3 bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 rounded-xl font-medium hover:opacity-90 transition-opacity">
                    开始使用 · Get Started
                </a>
            </div>
        </div>
    </div>

    <script>
        function activate() {
            var input = document.getElementById('key-input');
            var error = document.getElementById('error-msg');
            var key = input.value.trim().toUpperCase();

            if (!key) {
                error.textContent = '请输入激活码 · Enter activation key';
                error.classList.remove('hidden');
                return;
            }

            error.classList.add('hidden');
            var formData = new FormData();
            formData.append('key', key);

            fetch('/api/activate', { method: 'POST', body: formData })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.ok) {
                        document.getElementById('activate-form').classList.add('hidden');
                        document.getElementById('activate-success').classList.remove('hidden');
                    } else {
                        error.textContent = data.message;
                        error.classList.remove('hidden');
                    }
                })
                .catch(function() {
                    error.textContent = '网络错误 · Network error';
                    error.classList.remove('hidden');
                });
        }

        document.getElementById('key-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') activate();
        });

        // 自动格式化输入
        document.getElementById('key-input').addEventListener('input', function(e) {
            var val = e.target.value.replace(/[^A-Za-z0-9]/g, '').toUpperCase();
            if (val.length > 0) val = 'OMV-' + val.substring(3);
            if (val.length > 8) val = val.substring(0, 8) + '-' + val.substring(8);
            if (val.length > 13) val = val.substring(0, 13) + '-' + val.substring(13);
            e.target.value = val.substring(0, 19);
        });
    </script>
</body>
</html>

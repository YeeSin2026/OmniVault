{% for line in log_lines %}
<div class="flex border-b border-zinc-100 dark:border-zinc-800 hover:bg-zinc-50 dark:hover:bg-zinc-800/50 transition-colors {% if loop.index is odd %}bg-zinc-50/50 dark:bg-zinc-800/20{% endif %}">
    <span class="text-zinc-300 dark:text-zinc-600 px-2 py-0.5 font-mono text-[10px] shrink-0 border-r border-zinc-100 dark:border-zinc-800 select-none">{{ line.num }}</span>
    <span class="px-2 py-0.5 font-mono text-[10px] whitespace-pre flex-1
        {% if '[ERROR]' in line.text %}text-red-500 dark:text-red-400 font-semibold
        {% elif '[WARNING]' in line.text %}text-amber-600 dark:text-amber-400
        {% elif '[INFO]' in line.text %}text-zinc-700 dark:text-zinc-300
        {% else %}text-zinc-400 dark:text-zinc-500{% endif %}"><time datetime="{{ line.text[:10] }}T{{ line.text[11:19] }}Z">{{ line.text[:19] }}</time>{{ line.text[19:] }}</span>
</div>
{% else %}
<div class="p-4 text-center text-[12px] text-zinc-400 dark:text-zinc-500">暂无日志</div>
{% endfor %}

{% extends "base.html" %}
{% block title %}日志 — OmniVault{% endblock %}
{% block content %}

<div class="max-w-6xl mx-auto">
    <div class="mb-5">
        <h1 class="text-[16px] font-bold text-zinc-900 dark:text-zinc-200">系统日志</h1>
        <p class="text-[12px] text-zinc-500 dark:text-zinc-400 mt-1">实时查看后台处理日志</p>
    </div>

    <div class="bg-white dark:bg-zinc-900 rounded-xl border border-zinc-200 dark:border-zinc-800 shadow-2d">
        <div class="px-5 py-3 border-b border-zinc-100 dark:border-zinc-800 flex items-center justify-between">
            <h2 class="text-[14px] font-semibold text-zinc-700 dark:text-zinc-200">日志输出</h2>
            <div class="flex items-center gap-3">
                <span id="log-indicator" class="htmx-indicator text-[12px] text-zinc-500">刷新中...</span>
                <span class="text-[10px] text-zinc-400 dark:text-zinc-500">每 10 秒刷新</span>
                <button hx-get="/api/logs/html?lines=200" hx-target="#log-content" hx-indicator="#log-indicator"
                        class="px-3 py-1.5 rounded-lg text-[12px] text-zinc-600 dark:text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors">
                    刷新
                </button>
            </div>
        </div>
        <div id="log-content" class="divide-y divide-zinc-100 dark:divide-zinc-800"
             hx-get="/api/logs/html?lines=200" hx-trigger="load, every 10s" hx-indicator="#log-indicator"
             style="max-height: 75vh; overflow-y: auto; font-family: ui-monospace, monospace;">
            <div class="p-4 text-center text-[12px] text-zinc-400 dark:text-zinc-500">加载中...</div>
        </div>
    </div>
</div>

{% endblock %}
